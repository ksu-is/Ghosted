{% extends 'base.html' %}

{% block content %}
<section class="stats-grid">
    <div class="card"><h3>Total</h3><p>{{ stats.total }}</p></div>
    <div class="card"><h3>Applied</h3><p>{{ stats.applied }}</p></div>
    <div class="card"><h3>Interviewing</h3><p>{{ stats.interviewing }}</p></div>
    <div class="card"><h3>Offers</h3><p>{{ stats.offer }}</p></div>
    <div class="card"><h3>Rejected</h3><p>{{ stats.rejected }}</p></div>
</section>
{% endblock %}
